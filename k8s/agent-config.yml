apiVersion: v1
kind: ConfigMap
metadata:
  name: kuberun-agent-config
  namespace: default
data:
  config.yml: |
    # MUST stay in sync with KUBERUN_NAMESPACE and the controller Service name.
    # This will become a templated value once the Helm chart is built.
    kube_run_controller: "kuberun-controller.default.svc.cluster.local:4444"
    update: false
    ips:
    headless_map:
