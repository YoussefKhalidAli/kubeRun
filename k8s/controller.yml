apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuberun-controller
  labels:
    kuberun/operator: controller
spec:
  # DO NOT increase replicas. There is no leader election and controller state (store.Targets,
  # in-memory port allocations, HTTP switch servers) is not shared across replicas. Running more
  # than 1 replica will cause conflicting scale decisions and duplicate/broken switch ports.
  replicas: 1
  selector:
    matchLabels:
      kuberun/operator: controller
  template:
    metadata:
      labels:
        kuberun/operator: controller
        kuberun/run: "true"
    spec:
      serviceAccountName: kuberun-controller-sa
      subdomain: kuberun-controller
      containers:
        - name: kuberun-controller
          image: youssefkali/kuberun-controller:v0.5.1
          imagePullPolicy: Always
          resources:
               requests:
                 memory: "64Mi"
                 cpu: "50m"
               limits:
                 memory: "128Mi"
                 cpu: "150m"
          env:
            - name: SYNC_MINUTES
              value: "1"
          ports:
            - name: alert
              containerPort: 4444
---
apiVersion: v1
kind: Service
metadata:
  name: kuberun-controller
spec:
  selector:
    kuberun/operator: controller
  type: ClusterIP
  ports:
    - name: tcp-4444
      protocol: TCP
      port: 4444
      targetPort: 4444
