apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuberun-controller-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kuberun-controller-role
rules:
  # 1. Watch, list, create, and EDIT services across ALL namespaces
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # 2. Get/List/Watch information on Pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # 3. Workload management (Fixes the "auth-backend" forbidden error)
  # This grants get/list/watch, plus update/patch and scale subresource rights
  - apiGroups: ["apps"]
    resources:
      - "deployments"
      - "deployments/scale" # <-- Crucial for scaling/editing deployments
      - "replicasets"
      - "statefulsets"
      - "daemonsets"
    verbs: ["get", "list", "watch", "update", "patch"]

  # 4. Edit a SPECIFIC configmap only (kuberun-agent-config)
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["kuberun-agent-config"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kuberun-controller-binding
subjects:
  - kind: ServiceAccount
    name: kuberun-controller-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: kuberun-controller-role
  apiGroup: rbac.authorization.k8s.io
