apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-backend
  namespace: default
  labels:
    app: payment-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-server
  template:
    metadata:
      labels:
        app: payment-server
    spec:
      containers:
        - name: web
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: payment-backend-svc
  namespace: default
  labels:
    kuberun/run: "true"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
    - port: 8080
      targetPort: 8080
      name: doublehttp
    - port: 9090
      targetPort: 9090
      name: wierdhttp
  selector:
    app: payment-server
