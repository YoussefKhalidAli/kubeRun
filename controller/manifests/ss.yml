apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-db
  labels:
    app: datastore
spec:
  serviceName: "database-svc"
  replicas: 4
  selector:
    matchLabels:
      app: datastore
  template:
    metadata:
      labels:
        app: datastore
    spec:
      containers:
        - name: web
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: database-svc
  labels:
    kuberun/run: "true"
spec:
  clusterIP: None
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: datastore
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: database-ingress
  namespace: default
  annotations:
    # This regex rewrite ensures /nginx gets mapped to / on the underlying NGINX container safely
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: "ec2-3-87-239-112.compute-1.amazonaws.com" # Matches your current domain
      http:
        paths:
          - path: /nginx(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: database-svc
                port:
                  number: 80
