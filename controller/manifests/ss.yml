apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-db
  labels:
    app: datastore
spec:
  serviceName: "database-svc"
  replicas: 4
  selector:
    matchLabels:
      app: datastore
  template:
    metadata:
      labels:
        app: datastore
    spec:
      containers:
        - name: web
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: database-svc
  labels:
    kuberun/run: "true"
spec:
  clusterIP: None
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: datastore
