{{- include "kuberun.validateNamespace" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuberun-controller
  namespace: {{ .Values.namespace }}
  labels:
    KubeRun: Controller
spec:
  # DO NOT increase replicas. There is no leader election and controller state (store.Targets,
  # in-memory port allocations, HTTP switch servers) is not shared across replicas. Running more
  # than 1 replica will cause conflicting scale decisions and duplicate/broken switch ports.
  replicas: 1
  selector:
    matchLabels:
      KubeRun: Controller
  template:
    metadata:
      {{- if .Values.controller.podAnnotations }}
      annotations:
        {{- toYaml .Values.controller.podAnnotations | nindent 8 }}
      {{- end }}
      labels:
        KubeRun: Controller
        {{- if .Values.controller.podLabels }}
        {{- toYaml .Values.controller.podLabels | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "kuberun.controllerServiceAccountName" . }}
      subdomain: kuberun-controller
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: kuberun-controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          env:
            - name: SYNC_MINUTES
              value: {{ .Values.controller.syncMinutes | quote }}
            - name: KUBERUN_NAMESPACE
              value: {{ .Values.namespace | quote }}
            - name: KUBERUN_AGENT_CONFIG_NAME
              value: {{ .Values.agent.configMapName | quote }}
            - name: KUBERUN_AGENT_SERVICE_NAME
              # MUST match the hardcoded Service name "kuberun-agent" per Go code constraints.
              value: "kuberun-agent"
            {{- if .Values.controller.extraEnv }}
            {{- toYaml .Values.controller.extraEnv | nindent 12 }}
            {{- end }}
          ports:
            - name: alert
              containerPort: 4444
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
      {{- if .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.controller.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.controller.tolerations }}
      tolerations:
        {{- toYaml .Values.controller.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.controller.affinity }}
      affinity:
        {{- toYaml .Values.controller.affinity | nindent 8 }}
      {{- end }}
